<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos JS</title>

    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px
        }

        .element {
            width: 200px;
            height: 200px;
            background-color: aqua;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <button onclick="crearElemento()">Agregar elemento</button>
    <input type="text">
    <br><br>
    <label for="">R</label>
    <input type="number" id="r" min="0" max="255">
    <label for="">G</label>
    <input type="number" id="g" min="0" max="255">
    <label for="">B</label>
    <input type="number" id="b" min="0" max="255">
    <br><br>

    <div class="container">
    </div>

    <script>
        const container = document.querySelector('.container');
        const input = document.querySelector('input');
        const inputR = document.getElementById('r');
        const inputG = document.getElementById('g');
        const inputB = document.getElementById('b');
        let counter = 0;

        function crearElemento() {
            counter++;
            const element = document.createElement('div');
            element.textContent = input.value;
            const r = inputR.value || 0;
            const g = inputG.value || 0;
            const b = inputB.value || 0;
            element.style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            element.classList.add('element');
            container.appendChild(element);

            input.value = "";
        }
    </script>
</body>
</html>
