<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos JS</title>

    <style>
        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px
        }

        .element {
            width: 200px;
            height: 200px;
            background-color: aqua;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>
    
    <button onclick="crearElemento()">Agregar elemento</button>
    <input type="text">
    <br><br>
    <label for="">Color</label>
    <input type="color" id="icolor">

    <div class="container">
    </div>

    <script>
        const container = document.querySelector('.container');
        const input = document.querySelector('input');
        const inputColor = document.getElementById('icolor');
        let counter = 0;

        function crearElemento() {
            counter++;
            const element = document.createElement('div');
            element.textContent = input.value;
            element.style.backgroundColor = inputColor.value;
            element.classList.add('element');
            container.appendChild(element);

            input.value = "";
        }
    </script>
</body>
</html>
